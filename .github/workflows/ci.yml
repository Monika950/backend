name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build TypeScript
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: treasure_hunt_test
          DATABASE_SYNCHRONIZE: false
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh_secret
          JWT_RESET_SECRET: test_jwt_reset_secret
          EMAIL_PORT: 587
          EMAIL_HOST: smtp.gmail.com
          EMAIL_USER: test@example.com
          EMAIL_PASSWORD: test_password
          S3_UPLOAD_PREFIX_LOCATIONS: uploads/locations
          S3_UPLOAD_PREFIX_HUNTS: uploads/hunts
          S3_ALLOWED_MIME: image/jpeg,image/png,image/webp
          S3_MAX_FILE_SIZE: 2097152
          AWS_ACCESS_KEY_ID: test_key
          AWS_SECRET_ACCESS_KEY: test_secret
          AWS_REGION: eu-north-1
          S3_BUCKET_NAME: test-bucket
          FRONTEND_URL: http://localhost:3001
          PUBLIC_API_URL: http://localhost:3000

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | grep -o '"lines":{"total":[0-9]*,"covered":[0-9]*' | grep -o 'covered":[0-9]*' | grep -o '[0-9]*')
          TOTAL=$(cat coverage/coverage-summary.json | grep -o '"lines":{"total":[0-9]*' | grep -o '[0-9]*')
          PERCENTAGE=$((COVERAGE * 100 / TOTAL))
          echo "Coverage: $PERCENTAGE%"
          if [ $PERCENTAGE -lt 50 ]; then
            echo "Coverage is below 50%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
