version: '0.0.1'
services:
  postgre:
    image: postgres:17
    ports:
      - ${DATABASE_PORT}:5432
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    volumes:
      - postgre:/data
    networks:
      - backend
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
volumes:
  postgre:
    driver: local
